<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <title>SKPY AutoGest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/themes/'|add:theme_class|add:'.css' %}">
    
</head>
<body class="{{ theme_class }}">
    
    <style>
        :root {
            font-family: {{ font_family|default:"'Roboto', sans-serif" }};
            font-size: {{ base_size|default:"16px" }};
        }

        /* Estilos base que se aplican a todos los temas */
        .form-page-wrapper {
            min-height: 100vh;
            padding: 3rem 0;
        }

        .custom-card {
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }

        .custom-card-header {
            color: white;
            padding: 1.5rem;
            border: none;
        }

        .form-section-title {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-control, .form-select {
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .btn-save {
            border: none;
            padding: 0.8rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-1px);
        }

        /* Estilo global para hover en tablas de resultados */
        .results-card .table tbody tr:hover {
            {% if theme_class == 'theme-dark' %}
              background-color: rgba(255, 255, 255, 0.08);
            {% elif theme_class == 'theme-emerald' %}
              background-color: rgba(16, 185, 129, 0.08);
            {% elif theme_class == 'theme-sunset' %}
              background-color: rgba(245, 158, 11, 0.08);
            {% elif theme_class == 'theme-ocean' %}
              background-color: rgba(59, 130, 246, 0.08);
            {% elif theme_class == 'theme-light' %}
              background-color: rgba(0, 0, 0, 0.08);
            {% else %}
              background-color: rgba(13, 110, 253, 0.08);
            {% endif %}
        }
    </style>

    {% include '_navbar2.html' %}
    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
